<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamVault — IPTV Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--bg4:#243049;
  --bd:#2a3550;--bd2:#1e2a42;
  --t1:#f1f5f9;--t2:#94a3b8;--tm:#64748b;
  --ac:#3b82f6;--ach:#2563eb;--acg:rgba(59,130,246,.22);
  --err:#ef4444;--ok:#22c55e;
  --grad:linear-gradient(135deg,#3b82f6,#06b6d4);
  --r1:6px;--r2:10px;--r3:16px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.5;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
button,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer}

/* ── HEADER ── */
#header{
  height:56px;flex-shrink:0;
  display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--bg2);border-bottom:1px solid var(--bd);z-index:200;
}
#menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r1);color:var(--t2);transition:background .15s,color .15s}
#menu-btn:hover{background:var(--bg4);color:var(--t1)}
#menu-btn svg{display:block}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{color:var(--ac)}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#search-wrap{
  flex:1;max-width:480px;display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);
  padding:0 12px;height:36px;transition:border-color .2s,box-shadow .2s;
}
#search-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
#search-wrap svg{color:var(--tm);flex-shrink:0}
#search{flex:1;background:none;outline:none;border:none;font-size:13px;color:var(--t1)}
#search::placeholder{color:var(--tm)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
#fav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r1);font-size:13px;font-weight:500;color:var(--t2);transition:background .15s,color .15s}
#fav-btn:hover{background:rgba(239,68,68,.1);color:#ef4444}
#fav-btn.active{background:rgba(239,68,68,.15);color:#ef4444}

/* ── BODY ── */
#body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90}
#overlay.show{display:block}
#sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:240px;
  background:var(--bg2);border-right:1px solid var(--bd);
  overflow-y:auto;z-index:95;
  transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;padding:10px 8px;gap:2px;
}
#sidebar.open{transform:translateX(0)}
.sb-section-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--tm);padding:10px 12px 4px}
.sb-btn{
  display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r1);
  font-size:13px;font-weight:500;color:var(--t2);width:100%;text-align:left;
  transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sb-btn:hover{background:var(--bg4);color:var(--t1)}
.sb-btn.active{background:var(--acg);color:var(--ac)}
.sb-btn.active-fav{background:rgba(239,68,68,.15);color:#ef4444}
.sb-badge{margin-left:auto;font-size:10px;background:var(--bg4);color:var(--tm);border-radius:10px;padding:1px 6px;font-weight:600}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;padding:18px}

/* ── LAYOUT GRID ── */
#layout{
  display:grid;grid-template-columns:1fr 360px;gap:18px;
  max-width:1440px;margin:0 auto;
}

/* ── PLAYER ── */
#player-col{display:flex;flex-direction:column;gap:14px;min-width:0}
#player-wrap{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#000;border-radius:var(--r3);overflow:hidden;
}
#video{width:100%;height:100%;object-fit:contain;display:block}
#player-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;background:var(--bg3);
}
#player-placeholder .glow{
  position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--acg),transparent 70%);
  filter:blur(40px);animation:pulse 4s ease-in-out infinite;
}
#player-placeholder .ph-icon{position:relative;width:64px;height:64px;border-radius:50%;background:var(--bg4);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center}
#player-placeholder .ph-title{position:relative;font-size:20px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#player-placeholder .ph-sub{position:relative;font-size:13px;color:var(--tm);font-weight:500}
/* video controls overlay */
#controls{
  position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#player-wrap:hover #controls,#player-wrap.show-controls #controls{opacity:1;pointer-events:auto}
.ctrl-top{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
}
.ctrl-top .ch-name{font-size:14px;font-weight:600;color:#fff}
.live-badge{font-size:9px;font-weight:700;letter-spacing:1px;background:var(--err);color:#fff;padding:2px 6px;border-radius:3px}
.ctrl-bottom{
  display:flex;align-items:center;justify-content:space-between;padding:8px 14px;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
}
.ctrl-left{display:flex;align-items:center;gap:4px}
.cb{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r1);color:#fff;transition:background .15s}
.cb:hover{background:rgba(255,255,255,.12)}
.cb-main{width:44px;height:44px;border-radius:50%;background:var(--ac);transition:background .15s}
.cb-main:hover{background:var(--ach)}
#big-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:auto;opacity:0;transition:opacity .2s;
}
#player-wrap:not(.playing) #big-play{opacity:1}
#error-msg{
  display:none;position:absolute;inset:0;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;background:var(--bg3);
}
#error-msg.show{display:flex}
#error-msg p{font-size:13px;color:var(--tm)}
#retry-btn{padding:8px 18px;border-radius:var(--r1);background:var(--ac);color:#fff;font-size:13px;font-weight:600;transition:background .15s}
#retry-btn:hover{background:var(--ach)}
/* volume range */
.vol-wrap{display:flex;align-items:center;gap:6px}
#volume{width:64px;accent-color:var(--ac);cursor:pointer}

/* ── CHANNEL INFO ── */
#channel-info{
  display:none;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:14px 16px;
  gap:12px;align-items:center;
}
#channel-info.show{display:flex}
#ci-logo{width:48px;height:48px;border-radius:var(--r1);object-fit:cover;background:var(--bg4);flex-shrink:0}
#ci-logo-ph{width:48px;height:48px;border-radius:var(--r1);background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--tm);flex-shrink:0}
.ci-text{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:600;color:var(--t1)}
.ci-meta{font-size:12px;color:var(--tm);margin-top:2px}
.ci-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ci-fav{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--r1);color:var(--tm);transition:all .15s}
.ci-fav:hover,.ci-fav.active{color:#ef4444;background:rgba(239,68,68,.1)}

/* ── CHANNELS COLUMN ── */
#channels-col{display:flex;flex-direction:column;gap:10px;min-width:0}
#list-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
#list-title{font-size:15px;font-weight:600;color:var(--t1)}
#list-count{font-size:12px;color:var(--tm)}
#channel-list{display:flex;flex-direction:column;gap:6px}

/* ── CHANNEL ITEM ── */
.ch-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);
  cursor:pointer;transition:all .18s;
}
.ch-item:hover{background:var(--bg4);border-color:var(--bd)}
.ch-item.active{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac),0 4px 14px var(--acg)}
.ch-logo{width:42px;height:42px;border-radius:var(--r1);object-fit:cover;background:var(--bg4);flex-shrink:0}
.ch-logo-ph{width:42px;height:42px;border-radius:var(--r1);background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--tm);flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-cat{font-size:11px;color:var(--tm);margin-top:2px}
.ch-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--err);animation:pulse-dot 2s ease-in-out infinite}
.ch-fav-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--r1);color:var(--tm);transition:all .15s}
.ch-fav-btn:hover,.ch-fav-btn.active{color:#ef4444;background:rgba(239,68,68,.1)}

/* ── LOADING / EMPTY ── */
#loading-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px 20px;color:var(--tm);font-size:13px;
}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite}
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--tm);font-size:13px}
#empty-state svg{opacity:.4}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #layout{grid-template-columns:1fr}
  #channels-col{max-height:320px;overflow-y:auto}
}
@media(max-width:520px){
  #main{padding:12px}
  .logo-text{font-size:15px}
  #volume{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <button id="menu-btn" aria-label="Toggle menu">
    <svg id="icon-menu" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <svg id="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <div class="logo">
    <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
    <span class="logo-text">StreamVault</span>
  </div>
  <div id="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="Search channels…" autocomplete="off"/>
  </div>
  <div class="header-right">
    <button id="fav-btn">
      <svg id="fav-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Favorites</span>
    </button>
  </div>
</header>

<!-- BODY -->
<div id="body">
  <div id="overlay"></div>
  <nav id="sidebar">
    <div class="sb-section-title">BROWSE</div>
    <button class="sb-btn active" data-cat="__all__">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      All Channels
    </button>
    <button class="sb-btn" id="sb-fav-btn">
      <svg id="sb-fav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Favorites
    </button>
    <div class="sb-section-title" style="margin-top:8px">CATEGORIES</div>
    <div id="cat-list"></div>
  </nav>

  <main id="main">
    <div id="layout">
      <!-- Player column -->
      <div id="player-col">
        <div id="player-wrap">
          <video id="video" playsinline></video>
          <div id="player-placeholder">
            <div class="glow"></div>
            <div class="ph-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ac)"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
            </div>
            <div class="ph-title">StreamVault</div>
            <div class="ph-sub">Select a channel to start watching</div>
          </div>
          <div id="controls">
            <div class="ctrl-top">
              <span class="ch-name" id="ctrl-ch-name"></span>
              <span class="live-badge">LIVE</span>
            </div>
            <div class="ctrl-bottom">
              <div class="ctrl-left">
                <button class="cb" id="btn-skip-back" title="Skip -10s">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
                </button>
                <button class="cb cb-main" id="btn-play-pause">
                  <svg id="pp-icon" width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </button>
                <button class="cb" id="btn-skip-fwd" title="Skip +10s">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
                <button class="cb" id="btn-mute" title="Mute">
                  <svg id="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
                <div class="vol-wrap">
                  <input type="range" id="volume" min="0" max="1" step="0.05" value="1"/>
                </div>
              </div>
              <button class="cb" id="btn-fullscreen" title="Fullscreen">
                <svg id="fs-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              </button>
            </div>
          </div>
          <div id="big-play">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <div id="error-msg">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--tm)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <p id="error-text">Stream unavailable</p>
            <button id="retry-btn">Retry</button>
          </div>
        </div>
        <div id="channel-info">
          <img id="ci-logo" src="" alt="" style="display:none"/>
          <div id="ci-logo-ph">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
          </div>
          <div class="ci-text">
            <div class="ci-name" id="ci-name"></div>
            <div class="ci-meta" id="ci-meta"></div>
          </div>
          <div class="ci-actions">
            <button class="ci-fav" id="ci-fav-btn" title="Add to favorites">
              <svg id="ci-fav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Channels column -->
      <div id="channels-col">
        <div id="list-header">
          <h2 id="list-title">All Channels</h2>
          <span id="list-count"></span>
        </div>
        <div id="loading-state">
          <div class="spinner"></div>
          <span>Loading channels…</span>
        </div>
        <div id="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>No channels found</span>
        </div>
        <div id="channel-list"></div>
      </div>
    </div>
  </main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const PLAYLIST_URLS = ['https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/FIFA%20Sports.m3u','https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/FIFA.m3u','https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';]
let allChannels = [];
let filteredChannels = [];
let activeCategory = '__all__';
let showFavorites = false;
let currentChannel = null;
let hls = null;
let favorites = new Set(JSON.parse(localStorage.getItem('sv_favs') || '[]'));
let sidebarOpen = false;
let controlsTimeout = null;

// ── DOM REFS ───────────────────────────────────────────────────────────────
const video = document.getElementById('video');
const playerWrap = document.getElementById('player-wrap');
const placeholder = document.getElementById('player-placeholder');
const controls = document.getElementById('controls');
const bigPlay = document.getElementById('big-play');
const errorMsg = document.getElementById('error-msg');
const errorText = document.getElementById('error-text');
const retryBtn = document.getElementById('retry-btn');
const ctrlChName = document.getElementById('ctrl-ch-name');
const ppIcon = document.getElementById('pp-icon');
const volIcon = document.getElementById('vol-icon');

// ── M3U PARSER ────────────────────────────────────────────────────────────
function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const channels = [];
  let meta = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('#EXTINF')) {
      const logoMatch = line.match(/tvg-logo="([^"]*)"/);
      const groupMatch = line.match(/group-title="([^"]*)"/);
      const nameMatch = line.match(/,(.+)$/);
      meta = {
        name: nameMatch ? nameMatch[1].trim() : 'Unknown',
        logo: logoMatch ? logoMatch[1].trim() : '',
        category: groupMatch ? groupMatch[1].trim() : 'General',
      };
    } else if (meta && !line.startsWith('#')) {
      channels.push({ ...meta, url: line, id: `ch_${channels.length}` });
      meta = null;
    }
  }
  return channels;
}

// ── LOAD PLAYLIST ─────────────────────────────────────────────────────────
async function loadPlaylist() {
  try {
    const res = await fetch(M3U_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allChannels = parseM3U(text);
    buildCategoryList();
    applyFilter();
    loadingState.style.display = 'none';
  } catch (e) {
    loadingState.innerHTML = `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--tm)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Failed to load playlist</span>`;
  }
}

// ── CATEGORY LIST ─────────────────────────────────────────────────────────
function buildCategoryList() {
  const counts = {};
  for (const ch of allChannels) {
    const c = normalizeCategory(ch.category);
    counts[c] = (counts[c] || 0) + 1;
  }
  const cats = Object.keys(counts).sort();
  catList.innerHTML = '';
  for (const cat of cats) {
    const btn = document.createElement('button');
    btn.className = 'sb-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `${catIcon(cat)}<span style="flex:1;overflow:hidden;text-overflow:ellipsis">${cat}</span><span class="sb-badge">${counts[cat]}</span>`;
    btn.addEventListener('click', () => selectCategory(cat));
    catList.appendChild(btn);
  }
}

function normalizeCategory(cat) {
  return cat.trim();
}

function catIcon(cat) {
  const lc = cat.toLowerCase();
  if (lc.includes('sport')) return svgIcon('trophy');
  if (lc.includes('news')) return svgIcon('newspaper');
  if (lc.includes('kid') || lc.includes('child') || lc.includes('cartoon')) return svgIcon('star');
  if (lc.includes('music')) return svgIcon('music');
  if (lc.includes('movie') || lc.includes('film') || lc.includes('cinema')) return svgIcon('film');
  if (lc.includes('doc')) return svgIcon('book');
  return svgIcon('tv');
}

    trophy: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="11"/><path d="M7 4H4a2 2 0 0 0-2 2v1a8 8 0 0 0 8 8h4a8 8 0 0 0 8-8V6a2 2 0 0 0-2-2h-3"/><path d="M7 4h10"/></svg>',
    newspaper: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0-1.44 1.93A2 2 0 0 0 4 22z"/><path d="M16 2v20"/><line x1="8" y1="7" x2="12" y2="7"/><line x1="8" y1="11" x2="12" y2="11"/><line x1="8" y1="15" x2="12" y2="15"/></svg>',
    star: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    music: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
    film: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>',
    book: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  };
  return icons[name] || icons.tv;
}

// ── FILTERING ─────────────────────────────────────────────────────────────
function applyFilter() {
  const q = searchInput.value.toLowerCase().trim();
  let list = allChannels;

  if (showFavorites) {
    list = list.filter(ch => favorites.has(ch.id));
  } else if (activeCategory !== '__all__') {
    list = list.filter(ch => normalizeCategory(ch.category) === activeCategory);
  }

  if (q) {
    list = list.filter(ch =>
      ch.name.toLowerCase().includes(q) ||
      ch.category.toLowerCase().includes(q)
    );
  }

  filteredChannels = list;
  renderChannelList();

  // title
  if (showFavorites) listTitle.textContent = 'Favorites';
  else if (activeCategory !== '__all__') listTitle.textContent = activeCategory;
  else listTitle.textContent = 'All Channels';

  listCount.textContent = `${filteredChannels.length} channel${filteredChannels.length !== 1 ? 's' : ''}`;
}

function selectCategory(cat) {
  activeCategory = cat;
  showFavorites = false;
  updateFavUI();
  document.querySelectorAll('.sb-btn[data-cat]').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  sbFavBtn.classList.remove('active-fav');
  applyFilter();
  if (window.innerWidth <= 768) closeSidebar();
}

function selectAll() {
  activeCategory = '__all__';
  showFavorites = false;
  updateFavUI();
  document.querySelectorAll('.sb-btn[data-cat]').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === '__all__');
  });
  sbFavBtn.classList.remove('active-fav');
  applyFilter();
  if (window.innerWidth <= 768) closeSidebar();
}

function toggleFavoritesView() {
  showFavorites = !showFavorites;
  if (showFavorites) {
    activeCategory = '__all__';
    document.querySelectorAll('.sb-btn[data-cat]').forEach(b => b.classList.remove('active'));
    sbFavBtn.classList.add('active-fav');
    favBtn.classList.add('active');
    favIcon.setAttribute('fill', 'currentColor');
    sbFavIcon.setAttribute('fill', 'currentColor');
  } else {
    document.querySelector('.sb-btn[data-cat="__all__"]').classList.add('active');
    sbFavBtn.classList.remove('active-fav');
    updateFavUI();
  }
  applyFilter();
  if (window.innerWidth <= 768) closeSidebar();
}

function updateFavUI() {
  if (!showFavorites) {
    favBtn.classList.remove('active');
    favIcon.setAttribute('fill', 'none');
    sbFavIcon.setAttribute('fill', 'none');
  }
}

// ── RENDER CHANNELS ───────────────────────────────────────────────────────
function renderChannelList() {
  channelList.innerHTML = '';

  if (filteredChannels.length === 0) {
    emptyState.style.display = 'flex';
    return;
  }
  emptyState.style.display = 'none';

  const frag = document.createDocumentFragment();
  for (const ch of filteredChannels) {
    const isFav = favorites.has(ch.id);
    const isActive = currentChannel && currentChannel.id === ch.id;

    const el = document.createElement('div');
    el.className = `ch-item fade-in${isActive ? ' active' : ''}`;
    el.dataset.id = ch.id;

    const logoHtml = ch.logo
      ? `<img class="ch-logo" src="${escapeAttr(ch.logo)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="ch-logo-ph" style="display:none">${svgIcon('tv')}</div>`
      : `<div class="ch-logo-ph">${svgIcon('tv')}</div>`;

    el.innerHTML = `
      ${logoHtml}
      <div class="ch-info">
        <div class="ch-name">${escapeHtml(ch.name)}</div>
        <div class="ch-cat">${escapeHtml(ch.category)}</div>
      </div>
      <div class="ch-right">
        <div class="live-dot"></div>
        <button class="ch-fav-btn${isFav ? ' active' : ''}" data-fav="${ch.id}" title="${isFav ? 'Remove favorite' : 'Add favorite'}" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    `;

    el.addEventListener('click', () => playChannel(ch));
    el.querySelector('.ch-fav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavoriteChannel(ch);
    });

    frag.appendChild(el);
  }
  channelList.appendChild(frag);
}

// ── PLAY CHANNEL ──────────────────────────────────────────────────────────
function playChannel(ch) {
  currentChannel = ch;
  placeholder.style.display = 'none';
  errorMsg.classList.remove('show');
  channelInfo.classList.add('show');

  // Update info panel
  ciName.textContent = ch.name;
  ciMeta.textContent = ch.category;
  if (ch.logo) {
    ciLogo.src = ch.logo;
    ciLogo.style.display = 'block';
    ciLogoPh.style.display = 'none';
    ciLogo.onerror = () => {
      ciLogo.style.display = 'none';
      ciLogoPh.style.display = 'flex';
    };
  } else {
    ciLogo.style.display = 'none';
    ciLogoPh.style.display = 'flex';
  }
  updateCiFavBtn();

  ctrlChName.textContent = ch.name;

  // Update active state in list
  document.querySelectorAll('.ch-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === ch.id);
  });

  // Scroll active into view
  const activeEl = document.querySelector('.ch-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  loadStream(ch.url);
}

function loadStream(url) {
  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 90,
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hls.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          showError('Stream unavailable');
        }
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(() => {});
  } else {
    showError('HLS not supported in this browser');
  }
}

function showError(msg) {
  errorMsg.classList.add('show');
  errorText.textContent = msg;
}

retryBtn.addEventListener('click', () => {
  if (currentChannel) {
    errorMsg.classList.remove('show');
    loadStream(currentChannel.url);
  }
});

// ── VIDEO PLAYER CONTROLS ─────────────────────────────────────────────────
video.addEventListener('play', () => {
  playerWrap.classList.add('playing');
  ppIcon.setAttribute('d', '');
  ppIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  ppIcon.setAttribute('fill', 'white');
  ppIcon.setAttribute('stroke', 'none');
});
video.addEventListener('pause', () => {
  playerWrap.classList.remove('playing');
  ppIcon.innerHTML = '';
  // reset to play triangle
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','5 3 19 12 5 21 5 3');
  ppIcon.innerHTML = '';
  ppIcon.appendChild(poly);
});

document.getElementById('btn-play-pause').addEventListener('click', () => {
  video.paused ? video.play() : video.pause();
});
bigPlay.addEventListener('click', () => {
  if (currentChannel) video.paused ? video.play() : video.pause();
});
document.getElementById('btn-skip-back').addEventListener('click', () => { video.currentTime -= 10; });
document.getElementById('btn-skip-fwd').addEventListener('click', () => { video.currentTime += 10; });

document.getElementById('btn-mute').addEventListener('click', () => {
  video.muted = !video.muted;
  updateVolIcon();
});
volumeSlider.addEventListener('input', () => {
  video.volume = parseFloat(volumeSlider.value);
  video.muted = video.volume === 0;
  updateVolIcon();
});
function updateVolIcon() {
  if (video.muted || video.volume === 0) {
    volIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  } else {
    volIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  }
}

document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    playerWrap.requestFullscreen();
    fsIcon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
  } else {
    document.exitFullscreen();
    fsIcon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
  }
}

// Show/hide controls on hover / touch
playerWrap.addEventListener('mousemove', showControlsTemporarily);
playerWrap.addEventListener('touchstart', () => {
  playerWrap.classList.add('show-controls');
  clearTimeout(controlsTimeout);
  controlsTimeout = setTimeout(() => playerWrap.classList.remove('show-controls'), 3000);
});
function showControlsTemporarily() {
  clearTimeout(controlsTimeout);
  playerWrap.classList.add('show-controls');
  controlsTimeout = setTimeout(() => {
    if (!video.paused) playerWrap.classList.remove('show-controls');
  }, 3000);
}

// ── FAVORITES ─────────────────────────────────────────────────────────────
function toggleFavoriteChannel(ch) {
  if (favorites.has(ch.id)) {
    favorites.delete(ch.id);
  } else {
    favorites.add(ch.id);
  }
  saveFavorites();

  // Re-render fav buttons in list
  document.querySelectorAll(`.ch-fav-btn[data-fav="${ch.id}"]`).forEach(btn => {
    const isFav = favorites.has(ch.id);
    btn.classList.toggle('active', isFav);
    btn.querySelector('svg').setAttribute('fill', isFav ? 'currentColor' : 'none');
    btn.title = isFav ? 'Remove favorite' : 'Add favorite';
  });

  if (currentChannel && currentChannel.id === ch.id) updateCiFavBtn();
  if (showFavorites) applyFilter();
}

function updateCiFavBtn() {
  if (!currentChannel) return;
  const isFav = favorites.has(currentChannel.id);
  ciFavBtn.classList.toggle('active', isFav);
  ciFavIcon.setAttribute('fill', isFav ? 'currentColor' : 'none');
}

ciFavBtn.addEventListener('click', () => {
  if (currentChannel) toggleFavoriteChannel(currentChannel);
});

function saveFavorites() {
  localStorage.setItem('sv_favs', JSON.stringify([...favorites]));
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function openSidebar() {
  sidebarOpen = true;
  sidebar.classList.add('open');
  overlay.classList.add('show');
  iconMenu.style.display = 'none';
  iconClose.style.display = 'block';
}
function closeSidebar() {
  sidebarOpen = false;
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  iconMenu.style.display = 'block';
  iconClose.style.display = 'none';
}
menuBtn.addEventListener('click', () => sidebarOpen ? closeSidebar() : openSidebar());
overlay.addEventListener('click', closeSidebar);

document.querySelector('.sb-btn[data-cat="__all__"]').addEventListener('click', selectAll);
sbFavBtn.addEventListener('click', () => {
  toggleFavoritesView();
  if (window.innerWidth <= 768) closeSidebar();
});
favBtn.addEventListener('click', () => {
  toggleFavoritesView();
});

// ── SEARCH ────────────────────────────────────────────────────────────────
searchInput.addEventListener('input', applyFilter);

// ── UTILS ─────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadPlaylist();
</script>
